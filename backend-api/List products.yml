info:
  name: List products
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/products?search_term=cream&page=1&page_size=15"
  params:
    - name: search_term
      value: cream
      type: query
    - name: page
      value: "1"
      type: query
    - name: page_size
      value: "15"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
